version: "3.8"
services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgres://postgres:pass@postgres:5432/ar?sslmode=disable
      - S3_ENDPOINT=minio:9000
      - S3_BUCKET=ar-models
      - S3_ACCESS_KEY=minioadmin
      - S3_SECRET_KEY=minioadmin
      - AI_SERVICE_URL=http://ai-service:8000
    depends_on:
      - postgres
      - minio

  postgres:
    image: postgres:15
    environment:
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: ar
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./internal/migrations/0001_init.sql:/docker-entrypoint-initdb.d/init.sql # Авто-миграция при старте

  minio:
    image: minio/minio:RELEASE.2023-10-12T00-00-00Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001" # Web UI MinIO
    volumes:
      - minio-data:/data

  # --- СЕРВИС: BIM CONVERTER ---
  bim-converter:
    build: ./bim-converter
    environment:
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_BUCKET=ar-models
      - GO_BACKEND_URL=http://app:8080/api/v1/internal/bim-processed
    depends_on:
      - minio
      - app
 
  # --- СЕРВИС: AI ANALYSIS ---    
  ai-service:
    build: ./ai-service
    ports:
      - "8000:8000"
    volumes:
      - ai-models:/root/.ultralytics # Кэшируем веса YOLO между перезапусками

volumes:
  minio-data:
  postgres-data:
  ai-models: 
